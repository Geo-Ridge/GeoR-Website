name: Update Documentation

on:
  schedule:
    # Run every day at 2 AM UTC
    - cron: '0 2 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
  
  # Trigger when docs are updated in any project repo
  repository_dispatch:
    types:
      - docs-updated

jobs:
  update-docs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout GeoR-Website
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub gitpython
      
      - name: Run documentation update script
        run: |
          python update-docs.py
      
      - name: Check for changes
        id: verify-changes
        run: |
          if git diff --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Configure Git
        if: steps.verify-changes.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
      
      - name: Commit documentation updates
        if: steps.verify-changes.outputs.changes == 'true'
        run: |
          git add _*_docs/
          git commit -m "docs: update documentation from source repositories [skip ci]"
      
      - name: Push changes
        if: steps.verify-changes.outputs.changes == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: master

  build-and-deploy:
    needs: update-docs
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
      
      - name: Build Jekyll site
        run: |
          bundle exec jekyll build --config _config.yml
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          cname: geo-ridge.github.io
