---
layout: single
---

<div class="docs-content">
  <div class="docs-body">
    {{ content }}
  </div>

  {% if page.last_modified_at %}
    <div class="docs-footer">
      <small class="docs-last-modified">
        Last updated: {{ page.last_modified_at | date: "%B %d, %Y" }}
      </small>
    </div>
  {% endif %}
</div>

<style>
.docs-header {
  border-bottom: 2px solid var(--color-border);
  padding-bottom: 1rem;
  margin-bottom: 2rem;
}

.docs-page-title {
  margin: 0 0 0.5rem 0;
  font-size: 2rem;
  color: var(--color-text-primary);
}

.docs-excerpt {
  margin: 0;
  color: var(--color-text-secondary);
  font-style: italic;
}

.docs-body {
  font-size: 1rem;
  line-height: 1.6;
  color: var(--color-text-primary);
}

.docs-body h2 {
  margin-top: 2rem;
  margin-bottom: 1rem;
  font-size: 1.5rem;
  border-bottom: 1px solid var(--color-border);
  padding-bottom: 0.5rem;
}

.docs-body h3 {
  margin-top: 1.5rem;
  margin-bottom: 0.75rem;
  font-size: 1.2rem;
}

.docs-body code {
  background: var(--color-bg-code);
  color: #fff;
  border: 1px solid var(--color-border);
  border-radius: 3px;
  padding: 0.1em 0.3em;
  font-family: 'Courier New', monospace;
  font-size: 0.9rem;
}

.docs-body pre {
  background: var(--color-bg-code);
  color: #fff;
  border: 1px solid var(--color-border);
  border-radius: 4px;
  padding: 1rem;
  overflow-x: auto;
}

.docs-body pre code {
  background: none;
  border: none;
  padding: 0;
}

.docs-body a {
  color: var(--color-link);
  text-decoration: none;
}

.docs-body a:hover {
  text-decoration: underline;
}

.docs-body blockquote {
  border-left: 4px solid var(--color-border);
  margin: 1rem 0;
  padding-left: 1rem;
  color: var(--color-text-secondary);
}

.docs-footer {
  margin-top: 2rem;
  padding-top: 1rem;
  border-top: 1px solid var(--color-border);
}

.docs-last-modified {
  color: var(--color-text-secondary);
  font-style: italic;
}

.docs-page-title {
  font-size: 1.5rem;
}
</style>
