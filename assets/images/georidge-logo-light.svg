<svg width="640" height="240" viewBox="0 0 640 240" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style>
      .navy { fill: #0D2B45; }
      .teal { fill: #27C5C3; }
      .gray { fill: #6B7B83; }
      .ridge-stroke { stroke: #0D2B45; stroke-width: 6; fill: none; stroke-linejoin: round; }
      .ridge-stroke-teal { stroke: #27C5C3; stroke-width: 6; fill: none; stroke-linejoin: round; }
      .topo { stroke: #27C5C3; stroke-width: 1.5; fill: none; opacity: 0.4; }
    </style>
  </defs>

  <!-- Ridge Icon -->
  <g transform="translate(170,20)">
    <path class="ridge-stroke" d="M0 120 L60 40 L100 85 L150 20 L220 120 Z"/>
    <path class="ridge-stroke-teal" d="M120 120 L170 60 L210 100"/>
    
    <!-- Topographic lines -->
    <path class="topo" d="M30 110 Q90 95 160 110"/>
    <path class="topo" d="M40 95 Q110 75 190 95"/>
    <path class="topo" d="M50 80 Q120 60 200 80"/>
    
    <!-- Data nodes -->
    <circle cx="150" cy="20" r="5" fill="#27C5C3"/>
    <circle cx="100" cy="85" r="4" fill="#27C5C3"/>
  </g>

  <!-- Wordmark -->
  <text x="140" y="190" font-family="Montserrat, Arial, sans-serif" font-size="64" font-weight="700">
    <tspan class="navy">Geo</tspan><tspan class="teal">Ridge</tspan>
  </text>

  <!-- Tagline -->
  <text x="170" y="220" font-family="Montserrat, Arial, sans-serif" font-size="22" class="gray">
    Elevating Spatial Intelligence.
  </text>

</svg>